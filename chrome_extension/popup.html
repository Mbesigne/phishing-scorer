<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Phishing Risk Scorer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 400px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      min-height: 220px;
    }

    .container {
      padding: 28px 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .header {
      text-align: center;
    }
    .header .logo { font-size: 2.2rem; display: block; margin-bottom: 6px; }
    .header h1 {
      font-size: 1.1rem; font-weight: 800; color: #fff;
      letter-spacing: .02em;
    }
    .header p {
      font-size: .75rem; color: rgba(255,255,255,.7); margin-top: 4px;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .btn {
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      font-size: .92rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform .15s, opacity .15s;
      width: 100%;
    }
    .btn:hover  { transform: translateY(-1px); opacity: .93; }
    .btn:active { transform: translateY(0);    opacity: .85; }

    .btn-dashboard {
      background: rgba(255,255,255,.95);
      color: #764ba2;
    }
    .btn-test {
      background: rgba(255,255,255,.15);
      color: #fff;
      border: 2px solid rgba(255,255,255,.45);
      backdrop-filter: blur(4px);
    }

    .spinner {
      display: none;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status-bar {
      width: 100%;
      background: rgba(255,255,255,.12);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: .74rem;
      color: rgba(255,255,255,.9);
      text-align: center;
      border: 1px solid rgba(255,255,255,.2);
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <span class="logo">🛡️</span>
      <h1>Phishing Risk Scorer</h1>
      <p>Détection de phishing pour Gmail, Outlook &amp; Yahoo</p>
    </div>

    <div class="btn-group">
      <button class="btn btn-dashboard" id="btnDashboard">
        📊 Ouvrir le Tableau de Bord
      </button>
      <button class="btn btn-test" id="btnTest">
        <span class="spinner" id="spin"></span>
        <span id="btnTestLabel">🧪 Tester l'Extension</span>
      </button>
    </div>

    <div class="status-bar">
      ✅ Extension connectée à : phishing-scorer.onrender.com
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
